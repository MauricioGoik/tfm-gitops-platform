name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  trivy-image-scan:
    name: Trivy — Container Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name lowercase
        id: image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/demo-web:latest"
          echo "name=${IMAGE,,}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull image
        run: docker pull ${{ steps.image.outputs.name }}

      - name: Trivy — scan container image (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.name }}
          format: sarif
          output: trivy-image-results.sarif
          exit-code: '0'
          severity: CRITICAL,HIGH

      - name: Upload image scan to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-container

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-sarif
          path: trivy-image-results.sarif

      - name: Trivy — fail on CRITICAL (unfixed)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.name }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

  trivy-iac-scan:
    name: Trivy — IaC Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trivy — scan Terraform
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infra/
          format: sarif
          output: trivy-iac-results.sarif
          exit-code: '0'

      - name: Upload IaC scan to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-iac-results.sarif
          category: trivy-iac

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-iac-sarif
          path: trivy-iac-results.sarif

      - name: Trivy — scan Kubernetes manifests
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: k8s/
          format: sarif
          output: trivy-k8s-results.sarif
          exit-code: '0'

      - name: Upload K8s scan to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-k8s-results.sarif
          category: trivy-k8s

  checkov-scan:
    name: Checkov — IaC Deep Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/aws/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-terraform-results.sarif
          soft_fail: true
          external_checks_dir: policies/checkov/

      - name: Run Checkov on Kubernetes
        uses: bridgecrewio/checkov-action@master
        with:
          directory: k8s/
          framework: kubernetes
          output_format: sarif
          output_file_path: checkov-k8s-results.sarif
          soft_fail: true
          external_checks_dir: policies/checkov/

      - name: Run Checkov on Dockerfile
        uses: bridgecrewio/checkov-action@master
        with:
          directory: apps/
          framework: dockerfile
          output_format: sarif
          output_file_path: checkov-dockerfile-results.sarif
          soft_fail: true

      - name: Upload Terraform results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-terraform-results.sarif/results_sarif.sarif
          category: checkov-terraform

      - name: Upload K8s results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-k8s-results.sarif/results_sarif.sarif
          category: checkov-k8s

      - name: Upload Dockerfile results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-dockerfile-results.sarif/results_sarif.sarif
          category: checkov-dockerfile

      - name: Upload Checkov artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-results
          path: "*.sarif"

  conftest-policy-check:
    name: Conftest — Policy Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          CONFTEST_VERSION="0.56.0"
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz
          tar xzf conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/
          conftest --version

      - name: Run Conftest on Kubernetes manifests
        run: |
          echo "### 📋 Policy Validation Results" >> $GITHUB_STEP_SUMMARY

          conftest test k8s/base/deployment.yaml k8s/base/service.yaml \
            --policy policies/kubernetes/ \
            --all-namespaces \
            --output github \
            2>&1 | tee conftest-output.txt || true

          echo '```' >> $GITHUB_STEP_SUMMARY
          cat conftest-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload Conftest results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conftest-results
          path: conftest-output.txt

  trivy-upload-s3:
    name: Upload Reports to S3
    runs-on: ubuntu-latest
    needs: [trivy-image-scan, trivy-iac-scan, checkov-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download all SARIF artifacts
        uses: actions/download-artifact@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload reports to S3
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          COMMIT=${{ github.sha }}

          aws s3 cp trivy-image-sarif/trivy-image-results.sarif \
            s3://${{ secrets.S3_BUCKET_NAME }}/reports/${TIMESTAMP}-${COMMIT}-image.sarif

          aws s3 cp trivy-iac-sarif/trivy-iac-results.sarif \
            s3://${{ secrets.S3_BUCKET_NAME }}/reports/${TIMESTAMP}-${COMMIT}-iac.sarif

          echo "### 📊 Security Reports" >> $GITHUB_STEP_SUMMARY
          echo "Reports uploaded to S3 with timestamp ${TIMESTAMP}" >> $GITHUB_STEP_SUMMARY

  publish-dashboard:
    name: Publish Security Dashboard
    runs-on: ubuntu-latest
    needs: [trivy-image-scan, trivy-iac-scan, checkov-scan]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Trivy image SARIF
        uses: actions/download-artifact@v4
        with:
          name: trivy-image-sarif
          path: trivy-image-sarif/
        continue-on-error: true

      - name: Download Trivy IaC SARIF
        uses: actions/download-artifact@v4
        with:
          name: trivy-iac-sarif
          path: trivy-iac-sarif/
        continue-on-error: true

      - name: Download Checkov results
        uses: actions/download-artifact@v4
        with:
          name: checkov-results
          path: checkov-results/
        continue-on-error: true

      - name: Generate dashboard HTML
        run: |
          python3 scripts/generate_dashboard.py
          echo "=== Dashboard generado ==="
          ls -lh index.html

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Publish dashboard to S3
        run: |
          aws s3 cp index.html \
            s3://${{ secrets.S3_DASHBOARD_BUCKET }}/index.html \
            --content-type "text/html" \
            --cache-control "max-age=300"

          echo "### 🔒 Security Dashboard Published" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** http://${{ secrets.S3_DASHBOARD_BUCKET }}.s3-website-eu-west-1.amazonaws.com" >> $GITHUB_STEP_SUMMARY
