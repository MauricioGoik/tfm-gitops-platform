name: CI — Build & Push

# Se ejecuta en push a main y en Pull Requests
on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'k8s/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/demo-web

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Buildx permite builds multi-arquitectura (ARM64 + AMD64)
          platforms: linux/amd64,linux/arm64

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/demo-web
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache de capas Docker entre builds para ir más rápido
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### 🐳 Image Published" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ghcr.io" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY

  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name lowercase
        id: image
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/demo-web:latest"
          echo "name=${IMAGE,,}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.image.outputs.name }}
          format: spdx-json
          output-file: demo-web-sbom.spdx.json
          upload-artifact: true
          upload-artifact-retention: 30

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.image.outputs.name }}
          format: cyclonedx-json
          output-file: demo-web-sbom.cyclonedx.json
          upload-artifact: true
          upload-artifact-retention: 30

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload SBOMs to S3
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          COMMIT=${{ github.sha }}

          aws s3 cp demo-web-sbom.spdx.json \
            s3://${{ secrets.S3_BUCKET_NAME }}/sboms/${TIMESTAMP}-${COMMIT}-spdx.json

          aws s3 cp demo-web-sbom.cyclonedx.json \
            s3://${{ secrets.S3_BUCKET_NAME }}/sboms/${TIMESTAMP}-${COMMIT}-cyclonedx.json

          echo "### 📋 SBOM Generated" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ steps.image.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Formats:** SPDX JSON + CycloneDX JSON" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${COMMIT}" >> $GITHUB_STEP_SUMMARY
          echo "SBOMs uploaded to S3 under \`sboms/\`" >> $GITHUB_STEP_SUMMARY

      - name: Scan SBOM for vulnerabilities with Grype
        uses: anchore/scan-action@v4
        with:
          sbom: demo-web-sbom.spdx.json
          output-format: sarif
          output-file: grype-sbom-results.sarif
          fail-build: false

      - name: Upload Grype results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: grype-sbom-results.sarif
          category: grype-sbom
