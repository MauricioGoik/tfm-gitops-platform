apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-web
  labels:
    app: demo-web
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-web
  template:
    metadata:
      labels:
        app: demo-web
    spec:
      # Nunca correr como root — política de seguridad
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: demo-web
          # Esta imagen la actualizará GitHub Actions en cada push
          image: ghcr.io/mauriciogoik/demo-web:latest
          ports:
            - containerPort: 8080
          # Resource limits obligatorios — otra política que enforcaremos
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          # Health checks para que Kubernetes sepa si la app está sana
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
